version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchestra
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orchestra"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orchestra-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orchestra-net

  brain:
    build:
      context: ../..
      dockerfile: docker/api/Dockerfile
    command: uvicorn brain.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - brain-storage:/workspace/brain/storage
      - logs-dir:/workspace/logs
    environment:
      - ORCHESTRA_STORAGE_DIR=/workspace/brain/storage
      - ORCHESTRA_LOGS_DIR=/workspace/logs
      - ORCHESTRA_DATABASE_URL=postgresql://postgres:postgres@db:5432/orchestra
    depends_on:
      db:
        condition: service_healthy
    networks:
      - orchestra-net

  api:
    build:
      context: ../..
      dockerfile: docker/api/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - brain-storage:/workspace/brain/storage
      - logs-dir:/workspace/logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ORCHESTRA_STORAGE_DIR=/workspace/brain/storage
      - ORCHESTRA_LOGS_DIR=/workspace/logs
      - ORCHESTRA_DOCKER_SANDBOX=true
      - ORCHESTRA_DATABASE_URL=postgresql://postgres:postgres@db:5432/orchestra
      - ORCHESTRA_REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      brain:
        condition: service_started
    networks:
      - orchestra-net

  worker:
    build:
      context: ../..
      dockerfile: docker/api/Dockerfile
    command: python -m workers.conductor_worker
    volumes:
      - brain-storage:/workspace/brain/storage
      - logs-dir:/workspace/logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ORCHESTRA_STORAGE_DIR=/workspace/brain/storage
      - ORCHESTRA_LOGS_DIR=/workspace/logs
      - ORCHESTRA_DOCKER_SANDBOX=true
      - ORCHESTRA_DATABASE_URL=postgresql://postgres:postgres@db:5432/orchestra
      - ORCHESTRA_REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      brain:
        condition: service_started
    networks:
      - orchestra-net

volumes:
  brain-storage:
  logs-dir:
  pgdata:

networks:
  orchestra-net:
    driver: bridge
